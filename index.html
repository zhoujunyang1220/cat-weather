<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级小猫气象站 2.0</title>
    <link rel="stylesheet" href="style.css">
    <!-- 引入圆润字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&family=ZCOOL+KuaiLe&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="app-container">
        <!-- 顶部猫咪展示区 -->
        <div class="mascot-section">
            <div class="chat-bubble" id="chat-bubble">喵！输入城市看看我的新衣服！</div>
            <div class="cat-wrapper">
                <!-- 初始显示默认猫咪 -->
                <img src="images/cats.png" id="main-cat" alt="天气猫">
            </div>
        </div>

        <!-- 主卡片区 -->
        <div class="main-card">
            <div class="search-box">
                <input type="text" id="city-input" placeholder="输入城市名 (英文或中文)" spellcheck="false">
                <button id="search-btn">喵!</button>
            </div>

            <div class="weather-display">
                <h2 id="city-display">我的气象站</h2>

                <div class="temp-container">
                    <img src="https://openweathermap.org/img/wn/01d@4x.png" id="weather-icon">
                    <span id="temp-display">--°C</span>
                </div>

                <p id="desc-display">准备好出发了吗喵？</p>

                <!-- 四项天气指标 -->
                <div class="stats-row">
                    <div class="stat-card">
                        <span>空气湿度</span>
                        <strong id="humidity">--%</strong>
                    </div>
                    <div class="stat-card">
                        <span>小风阵阵</span>
                        <strong id="wind">--m/s</strong>
                    </div>
                    <div class="stat-card">
                        <span>大气压强</span>
                        <strong id="pressure">--hPa</strong>
                    </div>
                    <div class="stat-card">
                        <span>体感温度</span>
                        <strong id="feels-like">--°C</strong>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
